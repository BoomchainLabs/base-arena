kind = "web"
previewPath = "/"
title = "Base Battle Arena"
version = "1.0.0"
id = "artifacts/base-battle-arena-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 26140
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/base-battle-arena-ui run dev"

[services.env]
PORT = "26140"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/base-battle-arena-ui", "run", "build"]
publicDir = "artifacts/base-battle-arena-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
